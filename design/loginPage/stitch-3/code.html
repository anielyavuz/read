<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In to Bookpulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                        "slate-custom": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-[480px] mx-auto">
<!-- Header Section -->
<div class="flex items-center p-4 pb-2">
<button aria-label="Go back" class="flex size-12 shrink-0 items-center justify-start text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
</div>
<!-- Welcome Text -->
<div class="px-6 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-white text-4xl font-bold tracking-tight leading-tight">Welcome back</h1>
<p class="text-slate-500 dark:text-[#94A3B8] text-lg font-medium mt-2">Your league is waiting for you 🏆</p>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5 px-6 py-6">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Email</label>
<div class="relative">
<input class="w-full bg-slate-200 dark:bg-slate-custom/50 border-none rounded-xl h-14 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary transition-all" placeholder="Enter your email" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
<a class="text-primary text-xs font-bold hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center">
<input class="w-full bg-slate-200 dark:bg-slate-custom/50 border-none rounded-xl h-14 px-4 pr-12 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary transition-all" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-slate-400 dark:text-slate-500 flex items-center justify-center">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl shadow-lg shadow-primary/20 mt-4 transition-all active:scale-[0.98]">
                Sign In
            </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 px-6 py-6">
<div class="h-[1px] flex-1 bg-slate-300 dark:bg-slate-800"></div>
<span class="text-slate-500 dark:text-slate-500 text-sm font-medium">or continue with</span>
<div class="h-[1px] flex-1 bg-slate-300 dark:bg-slate-800"></div>
</div>
<!-- Social Logins -->
<div class="flex gap-4 px-6 pb-8">
<button class="flex-1 flex items-center justify-center gap-2 h-14 bg-white dark:bg-slate-custom border border-slate-200 dark:border-slate-800 rounded-xl transition-all hover:bg-slate-50 dark:hover:bg-slate-800/80">
<img alt="Google" class="size-6" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuACuOFOuNrWqi1-olGm0qhNisJD3F5OGH6WmPZauLmv2UQRiSJ-8Bl4tOH96zXvqRp85i0n0SexjILqH2HGPLVIlllIbz6egBfS5VkHFzwZciwAODlbr5EcUaDSKN5ted4ig4DHQ1shivnFa4R1eByhclw_QTTA5Eb-X6RzcvjJZgmRZN9dN-jO46BQh_9H44nOPiHKE2LBH85aaCr7499Gv7CV0I-idS8xfldg4XPBzNOkb0ZayPdqmdPBErnKs4aYkA_CJ3ho4KKW"/>
<span class="text-slate-900 dark:text-white font-semibold">Google</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 h-14 bg-white dark:bg-slate-custom border border-slate-200 dark:border-slate-800 rounded-xl transition-all hover:bg-slate-50 dark:hover:bg-slate-800/80">
<span class="material-symbols-outlined text-slate-900 dark:text-white text-2xl">ios</span>
<span class="text-slate-900 dark:text-white font-semibold">Apple</span>
</button>
</div>
<!-- Footer Sign Up -->
<div class="mt-auto pb-10 text-center">
<p class="text-slate-500 dark:text-slate-400 font-medium">
                Don't have an account? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Sign Up</a>
</p>
</div>
<!-- League Badge Placeholder (Decorative) -->
<div class="absolute bottom-40 right-[-20px] opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[180px] text-primary rotate-12">emoji_events</span>
</div>
</div>
</body></html>
