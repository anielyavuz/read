<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                        "surface-dark": "#1E293B",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden max-w-[480px] mx-auto">
<!-- Top Navigation -->
<div class="flex items-center p-4">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
</div>
<!-- Header Section -->
<div class="px-6 pt-2 pb-6">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight">Create your account</h1>
<p class="text-slate-500 dark:text-[#94A3B8] text-base font-normal leading-normal mt-2">Join thousands of readers competing to read more</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-4 px-6">
<!-- Full Name Input -->
<div class="flex flex-col">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Full Name</label>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 border-none bg-slate-200 dark:bg-surface-dark h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col mt-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Email</label>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 border-none bg-slate-200 dark:bg-surface-dark h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="Enter your email" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col mt-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Password</label>
<div class="relative flex items-center">
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 border-none bg-slate-200 dark:bg-surface-dark h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 pr-12 text-base font-normal" placeholder="Create a password" type="password"/>
<button class="absolute right-4 text-slate-400 dark:text-slate-500 flex items-center justify-center">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl mt-6 transition-all shadow-lg shadow-primary/20">
                Create Account
            </button>
</div>
<!-- Divider -->
<div class="px-6 py-8 flex items-center gap-4">
<div class="h-px flex-1 bg-slate-300 dark:bg-slate-800"></div>
<span class="text-slate-400 dark:text-slate-500 text-sm font-medium">or continue with</span>
<div class="h-px flex-1 bg-slate-300 dark:bg-slate-800"></div>
</div>
<!-- Social Logins -->
<div class="flex gap-4 px-6">
<button class="flex-1 flex items-center justify-center gap-2 h-14 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.152-1.928 4.176-1.028 1.048-2.64 2.176-5.912 2.176-5.232 0-9.28-4.224-9.28-9.456s4.048-9.456 9.28-9.456c2.84 0 4.912 1.112 6.632 2.76l2.312-2.312C19.152 2.016 16.32 0 12.48 0 5.696 0 0 5.696 0 12.48S5.696 24.96 12.48 24.96c3.68 0 6.632-1.216 8.88-3.6 2.296-2.296 3.016-5.504 3.016-8.08 0-.584-.048-1.136-.144-1.632l-11.752.272z"></path>
</svg>
<span class="font-medium text-slate-700 dark:text-slate-200">Google</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 h-14 rounded-xl border border-slate-300 dark:border-slate-700 bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.152 6.896c-.144 0-.36.024-.6.072a4.416 4.416 0 0 0-2.488 1.488 4.112 4.112 0 0 0-1.12 2.6c0 .096.008.192.016.288.08.768.424 2.104 1.056 3.016.632.904 1.488 1.952 2.44 1.952.064 0 .152-.008.264-.04.368-.088.8-.208 1.288-.208.48 0 .896.112 1.28.2.144.032.256.048.336.048.968 0 1.96-1.168 2.616-2.112.24-.344.408-.624.52-.84-.048-.024-.136-.064-.232-.128a3.912 3.912 0 0 1-2.024-3.48c0-2.048 1.632-3.048 1.76-3.12l.064-.04a3.816 3.816 0 0 0-2.912-1.576c-.08 0-.216.008-.368.032a3.312 3.312 0 0 1-.848.104zM12.096 0c.056 0 .144.008.248.016.92.112 1.848.656 2.432 1.344.592.68 1 1.656.88 2.616-.016.08-.04.184-.072.288-.08.312-.232.704-.488 1.048-.568.744-1.576 1.336-2.52 1.256-.056 0-.12-.008-.184-.016-.864-.12-1.768-.664-2.312-1.344-.552-.696-.864-1.632-.8-2.6.008-.096.024-.192.048-.28.112-.424.36-.88.68-1.24.632-.736 1.552-1.144 2.488-1.184.032 0 .072-.008.1z"></path>
</svg>
<span class="font-medium text-slate-700 dark:text-slate-200">Apple</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-auto py-8 text-center px-6">
<p class="text-slate-500 dark:text-slate-400 font-medium">
                Already have an account? 
                <a class="text-primary hover:underline ml-1" href="#">Sign In</a>
</p>
</div>
<!-- Bottom Safe Area Spacer -->
<div class="h-8"></div>
</div>
</body></html>
