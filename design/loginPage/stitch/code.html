<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<!-- Main Container (iOS Phone Form Factor) -->
<div class="relative flex h-screen w-full max-w-[430px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Status Bar Spacer (iOS) -->
<div class="h-12 w-full"></div>
<!-- Hero Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<!-- Logo Section -->
<div class="relative mb-12">
<div class="w-32 h-32 bg-primary/20 rounded-xl flex items-center justify-center relative overflow-hidden">
<!-- Abstract Background Pattern for Logo Area -->
<div class="absolute inset-0 opacity-30 bg-gradient-to-br from-primary via-transparent to-primary/50" data-alt="Abstract purple and navy gradient background pattern"></div>
<!-- Book + Pulse Icon -->
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-6xl !leading-none" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48">
                            menu_book
                        </span>
<div class="absolute -bottom-1 w-16 h-4 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'wght' 600">
                                monitoring
                            </span>
</div>
</div>
</div>
<!-- Gamification Hint (Floating Streak) -->
<div class="absolute -top-4 -right-8 bg-slate-800/80 backdrop-blur-md border border-amber-500/30 px-3 py-1.5 rounded-full flex items-center gap-2 shadow-lg">
<span class="material-symbols-outlined text-amber-500 text-sm" style="font-variation-settings: 'FILL' 1">
                        bolt
                    </span>
<span class="text-white text-sm font-bold">0</span>
</div>
</div>
<!-- Typography -->
<div class="space-y-4">
<h1 class="text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white">
                    Bookpulse
                </h1>
<p class="text-xl font-bold tracking-wide text-primary uppercase">
                    Read. Compete. Win.
                </p>
<p class="text-slate-500 dark:text-slate-400 max-w-[280px] mx-auto leading-relaxed">
                    The ultimate reading tracker for the BookTok community. Level up your library.
                </p>
</div>
</div>
<!-- Action Area (Bottom) -->
<div class="px-8 pb-16 flex flex-col gap-4">
<!-- Primary Action -->
<div class="relative group">
<!-- Glow Effect -->
<div class="absolute -inset-0.5 bg-primary rounded-xl blur opacity-30 group-hover:opacity-50 transition duration-300"></div>
<button class="relative w-full flex items-center justify-center bg-primary text-white text-lg font-bold py-4 rounded-xl shadow-xl transition-transform active:scale-95">
<span>Get Started</span>
<span class="material-symbols-outlined ml-2 text-xl">
                        arrow_forward
                    </span>
</button>
</div>
<!-- Secondary Action -->
<button class="w-full py-2 text-slate-600 dark:text-slate-300 font-semibold text-base hover:text-primary transition-colors">
                I already have an account
            </button>
<!-- Social/Community Hint -->
<div class="mt-4 flex items-center justify-center gap-2 text-slate-400 text-xs font-medium uppercase tracking-[0.2em]">
<span class="h-px w-8 bg-slate-800"></span>
<span>Join the League</span>
<span class="h-px w-8 bg-slate-800"></span>
</div>
</div>
<!-- Abstract Decorative Elements -->
<div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 bg-primary/10 rounded-full blur-[80px] pointer-events-none"></div>
<div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-64 h-64 bg-primary/10 rounded-full blur-[80px] pointer-events-none"></div>
<!-- Home Indicator (iOS) -->
<div class="h-1.5 w-32 bg-slate-800 rounded-full mx-auto mb-2"></div>
</div>
</body></html>
