<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Set Your Reading Goal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center">
<div class="relative flex h-[844px] w-[390px] flex-col bg-background-light dark:bg-background-dark overflow-hidden border border-slate-200 dark:border-slate-800 shadow-2xl">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Bookpulse</h2>
</div>
<div class="flex w-full flex-row items-center justify-center gap-3 py-5">
<div class="h-2 w-8 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
</div>
<div class="flex-1 flex flex-col px-6">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-[28px] font-bold leading-tight text-center pb-3 pt-5">Set your daily reading goal</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-8 text-center">We'll remind you and track your streak</p>
<div class="flex flex-col items-center justify-center py-10 relative">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<div class="relative flex flex-col items-center">
<span class="text-primary text-8xl font-extrabold tracking-tighter">20</span>
<span class="text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest text-xs mt-2">Pages Per Day</span>
</div>
</div>
<div class="grid grid-cols-3 gap-3 py-6">
<button class="flex items-center justify-center py-3 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold hover:border-primary/50 transition-colors">
                    15
                </button>
<button class="flex items-center justify-center py-3 px-4 rounded-xl border-2 border-primary bg-primary/10 text-primary font-bold shadow-lg shadow-primary/10">
                    20
                </button>
<button class="flex items-center justify-center py-3 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold hover:border-primary/50 transition-colors">
                    30
                </button>
</div>
<div class="mt-8 bg-slate-800/50 dark:bg-slate-900 rounded-2xl p-4 border border-slate-700/50">
<div class="flex items-center gap-3">
<div class="bg-amber-500/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-amber-500" style="font-variation-settings: 'FILL' 1">local_fire_department</span>
</div>
<p class="text-amber-100/90 text-sm font-medium leading-tight">
                        Readers who set goals read <span class="text-amber-400 font-bold">3x more</span> than those who don't.
                    </p>
</div>
</div>
</div>
<div class="p-6 pb-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-xl shadow-primary/20 transition-all flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<div class="mt-4 flex justify-center">
<div class="h-1.5 w-32 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
</div>
</div>
</body></html>
